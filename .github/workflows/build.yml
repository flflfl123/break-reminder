# GitHub Actions 自动打包工作流
# 推送代码或手动触发时，自动在云端编译生成APK
name: Android CI Build

# 触发条件：
# 1. 推送到main/master分支时自动触发
# 2. 在GitHub页面手动触发
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# 构建任务
jobs:
  build:
    # 运行环境：Ubuntu最新版
    runs-on: ubuntu-latest

    steps:
      # 第1步：拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 第2步：配置JDK 17（Android Gradle Plugin 8.x要求）
      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 第3步：生成Gradle Wrapper（如果项目中没有wrapper jar）
      # gradle-wrapper.jar是二进制文件，不方便提交到Git
      # 这里用Gradle命令自动生成完整的Wrapper
      - name: 生成Gradle Wrapper
        run: |
          # 临时安装Gradle用于生成Wrapper
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.2/bin/gradle wrapper --gradle-version 8.2

      # 第4步：缓存Gradle依赖，加速后续构建
      - name: 缓存Gradle依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 第5步：授予Gradle Wrapper执行权限
      - name: 授予执行权限
        run: chmod +x gradlew

      # 第6步：编译调试版APK
      - name: 构建调试版APK
        run: ./gradlew assembleDebug

      # 第7步：上传APK到Artifacts（可在Actions页面下载）
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          # Artifact名称
          name: break-reminder-debug
          # APK文件路径
          path: app/build/outputs/apk/debug/*.apk
          # 保留30天
          retention-days: 30
